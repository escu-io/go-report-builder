<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coverage Report</title>
  <style>{{.CSS}}</style>
</head>
<body class="theme-dark">
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.5 12a8.5 8.5 0 1 1-3.2-6.65"></path>
          <path d="M8.5 11.8l3 3 6-6.6"></path>
        </svg>
      </div>
      <div class="brand-text">
        <h1>Coverage Report</h1>
        <p class="module" id="module-path"></p>
      </div>
    </div>

    <div class="headline">
      <div class="gauge" id="overall-gauge">
        <svg viewBox="0 0 36 36" width="56" height="56">
          <circle class="gauge-track" cx="18" cy="18" r="15.5"></circle>
          <circle class="gauge-fill" id="gauge-arc" cx="18" cy="18" r="15.5"></circle>
        </svg>
        <span class="gauge-pct" id="overall-pct">0%</span>
      </div>
      <div class="headline-meta">
        <span class="headline-label">Overall coverage</span>
        <span class="meta" id="overall-meta"></span>
      </div>
    </div>

    <button type="button" id="theme-toggle" class="icon-btn" aria-label="Toggle theme" title="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
  </header>

  <div class="toolbar">
    <div class="segmented" id="view-selector" role="tablist" aria-label="View mode">
      <span class="seg-indicator" id="seg-indicator"></span>
      <button type="button" class="seg" data-view="treemap" role="tab" aria-selected="true">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="8" rx="1"></rect><rect x="13" y="3" width="8" height="5" rx="1"></rect><rect x="13" y="10" width="8" height="11" rx="1"></rect><rect x="3" y="13" width="8" height="8" rx="1"></rect></svg>
        Tree Map
      </button>
      <button type="button" class="seg" data-view="files" role="tab" aria-selected="false">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        Files
      </button>
    </div>

    <div class="search-box" id="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
      <input type="text" id="search-input" placeholder="Filter files…" autocomplete="off" spellcheck="false" aria-label="Filter files">
      <button type="button" class="search-clear" id="search-clear" aria-label="Clear filter" title="Clear filter" hidden>
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
      </button>
      <kbd class="search-hint">/</kbd>
    </div>

    <div class="run-filter" id="run-filter">
      <button type="button" class="run-trigger" id="run-trigger" aria-haspopup="true" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M7 12h10M10 18h4"></path></svg>
        <span id="run-trigger-label">All runs</span>
        <svg class="chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m6 9 6 6 6-6"></path></svg>
      </button>
      <div class="run-menu" id="run-menu" role="menu"></div>
    </div>
  </div>

  <main>
    <section id="view-treemap" class="view active"></section>
    <section id="view-files" class="view">
      <div class="explorer" id="explorer">
        <aside class="explorer-sidebar" id="explorer-sidebar">
          <div class="explorer-sidebar-head">
            <button type="button" class="explorer-toggle" id="explorer-toggle" aria-label="Toggle file tree" title="Toggle file tree" aria-expanded="true">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
            </button>
            <span class="explorer-sidebar-title">Files</span>
            <div class="tree-actions">
              <button type="button" id="tree-expand" title="Expand all" aria-label="Expand all">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 9 4-4 4 4"></path><path d="m16 15-4 4-4-4"></path></svg>
                <span class="ta-label">Expand all</span>
              </button>
              <button type="button" id="tree-collapse" title="Collapse all" aria-label="Collapse all">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 5 4 4 4-4"></path><path d="m8 19 4-4 4 4"></path></svg>
                <span class="ta-label">Collapse all</span>
              </button>
            </div>
          </div>
          <div class="tree-scroll" id="tree-scroll"></div>
        </aside>
        <div class="explorer-detail" id="explorer-detail">
          <div class="file-head">
            <div class="file-title">
              <span class="file-name" id="file-name">Select a file</span>
              <span class="file-path" id="file-path"></span>
            </div>
            <div class="file-stats">
              <span class="file-pct" id="file-pct"></span>
              <div id="run-badges" class="run-badges"></div>
            </div>
          </div>
          <pre id="source-view"><code></code></pre>
        </div>
      </div>
    </section>
  </main>

  <footer class="legend">
    <span class="legend-label">Coverage</span>
    <span class="legend-end">0%</span>
    <span class="legend-bar" id="legend-bar"></span>
    <span class="legend-end">100%</span>
  </footer>

  <script type="application/json" id="coverage-data">{{.Data}}</script>
  <script>{{.JS}}</script>
</body>
</html>
