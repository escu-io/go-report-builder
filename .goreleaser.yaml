version: 2

project_name: go-report-builder

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: go-report-builder
    main: ./cmd/go-report-builder
    binary: go-report-builder
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore\\(deps\\):"
      - "^chore\\(release\\):"
  groups:
    - title: Added
      regexp: "^feat"
      order: 0
    - title: Fixed
      regexp: "^fix"
      order: 1
    - title: Changed
      regexp: "^perf|^refactor"
      order: 2
    - title: Other
      order: 999

release:
  github:
    owner: escu-io
    name: go-report-builder
  draft: false
  prerelease: auto
