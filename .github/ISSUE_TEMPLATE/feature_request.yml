name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or designs you considered

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: CLI
        - label: Library (`covhtml`)
        - label: HTML report UI
        - label: Documentation / examples
